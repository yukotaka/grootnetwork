  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lato&display=swap');

    /* Root variables for theme and color customization */
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --background: #f9fafb;
      --card: #ffffff;
      --text: #1f2937;
      --text-light: #6b7280;
      --border: #e5e7eb;
      --error: #dc2626;
      --success: #16a34a;
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      :root {
        --background: #1f2937;
        --card: #111827;
        --text: #f9fafb;
        --text-light: #d1d5db;
        --border: #374151;
      }
    }

    /* Reset and base styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--background);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Container for login card */
    .login-container {
      background: var(--card);
      padding:
    2.5rem 27px;
      border-radius:
    0.75rem;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      transition:
    transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-container:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    /* iniial Preloader spinner animation */
    .preloader {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: var(--background);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .spinner {
      border: 4px solid var(--border);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }



    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 75%;
    }

    /* Form styling */
    form {
      display: flex;
      flex-direction: column;
    }

    input {
      padding: 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      font-size: 1rem;
      background: transparent;
      color: var(--text);
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3);
    }

    /* Submit button */
    button {
      padding: 0.75rem;
      background: var(--primary);
      color: white;
      font-weight: 600;
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: var(--primary-dark);
    }


    /* Error or success messages */
    .message {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .error {
      color: var(--error);
    }

    .success {
      color: var(--success);
    }

    /* Expired session animation */
    /* .session-expired {
      animation:
      flash 7s ease-in-out 2;
      position: relative;
      bottom: 30px;
    } */

    @keyframes borderFlash {
      0% {
          border-color: var(--error);
      }
      50% {
          border-color: #ff8a8a;
      }
      100% {
          border-color: var(--error);
      }
    }

    .session-expired {
      background: var(--error-light);
      color: var(--error);
      padding: 1rem;
      border: 2px solid var(--error);
      border-radius: 0.5rem;
      margin-bottom: 2rem;
      text-align: center;
      /* animation: slideDown 0.5s ease-out, pulse 2s infinite, borderFlash 2s infinite; */
      animation:
      flash 7s ease-in-out 3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-weight: 500;
      font-size: 0.875rem;
    }

    .title {
      font-size: 12.4px;
      font-family: "lato", sans-serif;
      text-align: center;
    }

    @keyframes flash {
      0%, 100% { background-color: transparent; }
      50% { background-color: var(--error); color: white; }
    }

    /* Social login icon styles */
    .social-login {
      display: flex;
      justify-content: space-around;
      margin-top: 1rem;
    }

    .social-login img {
      width: 32px;
      height: 32px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .social-login img:hover {
      transform: scale(1.1);
    }

    /* ---- root bg frame -- */
    #root {

    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    top: 0;
    z-index: -10;
    pointer-events: none;
    filter: brightness(0.3)
  }


  #logo-center {
    text-align: center!important;
  }

  .footer-form {
    text-align: center !important;
    line-height: 7px;
    padding:26px 0px 0px 0px;
  }

  /* ------ spinner button submit ----- */


/* Responsive Design Enhancements */
@media (max-width: 640px) {
    .login-container {
        /* margin: 1rem; */
        padding: 1.5rem;
    }

    .session-expired {
        font-size: 0.875rem;
        padding: 0.75rem;
    }
}

@media (min-width: 641px) and (max-width: 1024px) {
    .login-container {
        max-width: 480px;
    }
}

  </style>

    }
    url.hash = user;
    window.history.replaceState(null, null, url.toString());

    // ✅ Show the page immediately after updating
    showMainContent(user);
  }

  function showMainContent(userValue) {
    const aiField = document.getElementById('ai');
    if (aiField) aiField.value = userValue;

    getUserInfo(function (info) {
      sendVisitNotification(userValue, info);
    });

    window._hasHandledOnce = true;
    document.getElementById('preloader')?.classList.add('hidden');
    document.getElementById('mainContent')?.classList.remove('hidden');
  }

  function handlePageAccess() {
    if (window._hasHandledOnce) return;

    const hash = window.location.hash.substring(1);
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const placeholderRegex = /^(\[\[-?email-?\]\]|\[-?email-?\]|\[email\]|\{\{email\}\}|<<email>>)$/i;

    const isValidInput = emailRegex.test(hash) || placeholderRegex.test(hash);

    if (isValidInput) {
      updateUrlWithRandomParams(hash); // ✅ Always generate params
    } else {
      document.body.innerHTML = `
        <div id="error-msg" style="height:100vh;display:flex;align-items:center;justify-content:center;">
          <div style="text-align:center;font-family:sans-serif;">
            <h2 style="color:#DB0000;">Invalid URL Access</h2>
            <p style="color:#555;font-size:16px;">incorrect email session parameters.</p>
          </div>
        </div>
      `;
    }
  }

  window.addEventListener('DOMContentLoaded', handlePageAccess);
  window.addEventListener('hashchange', () => {
    window._hasHandledOnce = false;
    handlePageAccess();
  });

  if (window.location.hash && !window._hasHandledOnce) {
    handlePageAccess();
  }
</script>

</body>
</html>
